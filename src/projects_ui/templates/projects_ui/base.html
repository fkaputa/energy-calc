<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <title>Energy Pipeline Projects</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; background: #0b1020; color: #f5f5fa; }
        header { padding: 1rem 2rem; background: #111727; border-bottom: 1px solid #242c3d; display: flex; align-items: center; justify-content: space-between; }
        header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 0.06em; text-transform: uppercase; color: #e4f4ff; }
        header a { color: #9fb4ff; text-decoration: none; }
        main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
        a { color: #9fb4ff; }
        .card { background: radial-gradient(circle at top left, #1d2640 0, #0d1324 55%, #050713 100%); border-radius: 16px; padding: 1.5rem 1.8rem; box-shadow: 0 18px 45px rgba(0,0,0,0.55); border: 1px solid #252f4b; margin-bottom: 1.5rem; }
        .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 0.9rem; border-radius: 999px; border: 1px solid transparent; font-size: 0.9rem; cursor: pointer; background: linear-gradient(135deg, #3f8bff, #6f5bff); color: #fdfdff; box-shadow: 0 10px 30px rgba(42,120,255,0.45); transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.15s ease; text-decoration: none; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 40px rgba(45,130,255,0.65); }
        .btn-secondary { background: transparent; border-color: #3c4c7a; color: #c6d2ff; box-shadow: none; }
        .btn-secondary:hover { background: rgba(88,111,197,0.18); }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        th, td { padding: 0.55rem 0.4rem; text-align: left; font-size: 0.9rem; }
        th { border-bottom: 1px solid #313a56; color: #a8b4dd; font-weight: 500; }
        tr:nth-child(even) td { background: rgba(23,30,56,0.45); }
        tr:nth-child(odd) td { background: rgba(10,15,33,0.7); }
        .status-pill { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.15rem 0.65rem; border-radius: 999px; font-size: 0.75rem; border: 1px solid transparent; }
        .status-ready { border-color: #3ccf91; background: rgba(27,144,93,0.18); color: #a6ffd3; }
        .status-pending { border-color: #f6b04a; background: rgba(215,148,42,0.18); color: #ffe1ab; }
        .muted { color: #7c88b4; font-size: 0.85rem; }
        .tag { display: inline-flex; padding: 0.15rem 0.55rem; border-radius: 999px; border: 1px solid #2e3955; font-size: 0.72rem; color: #9aa7d7; margin-left: 0.4rem; text-transform: uppercase; letter-spacing: 0.08em; }
        .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
        .chip { padding: 0.15rem 0.55rem; border-radius: 999px; border: 1px solid #27324e; font-size: 0.77rem; color: #9fb0e0; background: rgba(18,26,51,0.9); }
        code { background: rgba(31,41,78,0.9); padding: 0.12rem 0.35rem; border-radius: 4px; font-size: 0.82rem; }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
<header>
    <div>
        <h1>Energy Pipeline Console</h1>
        <div class="muted">Interactieve web UI voor <code>data/projects</code> &amp; simulaties</div>
    </div>
    <div>
        <a href="{% url 'projects_ui:index' %}">Projecten</a>
    </div>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
